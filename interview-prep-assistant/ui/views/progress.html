<div id="progress-view" style="display: none; padding: 20px;">
    <h2>My Progress</h2>
    <div id="progress-milestone" style="background-color: #fcf8e3; padding: 10px; border: 1px solid #faebcc; display: none;"></div>
    
    <div style="display: flex; gap: 20px; margin-top: 15px;">
        <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
            <h3>All-time Avg</h3>
            <p id="progress-avg" style="font-size: 24px; font-weight: bold;">0.0</p>
        </div>
        <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
            <h3>Trend</h3>
            <p id="progress-trend" style="font-size: 24px; font-weight: bold;">-</p>
        </div>
        <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
            <h3>Streak</h3>
            <p id="progress-streak" style="font-size: 24px; font-weight: bold;">0 days</p>
        </div>
        <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
            <h3>Sessions</h3>
            <p id="progress-sessions" style="font-size: 24px; font-weight: bold;">0</p>
        </div>
    </div>

    <h3 style="margin-top: 30px;">Score History</h3>
    <pre id="progress-history" style="font-family: monospace; background: #2b2b2b; color: #fff; padding: 15px; border-radius: 5px;"></pre>
</div>
